<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

    <link rel="stylesheet" href="style.css" />

<body id="blink">
    <div class="blink-form">
        <div class="auth-head">
            <!-- <button class="btn-back" id="btn-auth-back"> -->
                <!-- <i class="fa-solid fa-arrow-left"></i> -->
            <!-- </button> -->
            <h4>Welcome! Sign in to continue</h4>
        </div>
        <form id="auth-form" class="auth-form">
            <!-- <div class="input-group">
                <label for="auth-name">Display Name</label>
                <input type="text" id="auth-name" placeholder="Cupid" />
            </div> -->
            <div class="input-group">
                <label for="auth-email">Email Address</label>
                <input type="email" id="auth-email" placeholder="name@example.com" required />
            </div>
            <div class="input-group">
                <label for="auth-password">Password</label>
                <input type="password" id="auth-password" placeholder="••••••••" required />
            </div>
            <button id="norm-sign" class="button" onclick="window.location.href='/chat.html'">Sign In</button>
            </form>
            <hr>
            <!-- <button id="norm-sign" class="button">Sign In</button> -->
            <button id="sign-google" class="button2" >Sign in with google</button>
            <button id="sign-github" class="button2" >Sign in with github</button>
        <!-- </form> -->
    </div>


    <script type="module">
        import User from "./user.js";

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import {
            signInWithEmailAndPassword,
            GithubAuthProvider,
            GoogleAuthProvider,
            getAuth,
            onAuthStateChanged,
            signInWithPopup,
        } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAS-d_3VUTsW2A7yEIVW0ETqY1um3fPPz0",
            authDomain: "febfire-700ba.firebaseapp.com",
            projectId: "febfire-700ba",
            storageBucket: "febfire-700ba.firebasestorage.app",
            messagingSenderId: "17245351215",
            appId: "1:17245351215:web:a0107d6dcddb677ce2c5da",
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const provider = new GoogleAuthProvider();
        const provider1 = new GithubAuthProvider();
        const auth = getAuth();

        document.getElementById("sign-google").addEventListener("click", () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    const sthelse = result.user;
                    console.log(sthelse);

                    let loggedUser = new User(
                        sthelse.name,
                        sthelse.email,
                        sthelse.photoURL,
                        sthelse.uid,
                    );
                    loggedUser.saveuser();
                    console.log(sthelse);
                    window.location.href = "/chat.html"
                })
                .catch((error) => {
                    console.log(error);
                });
        });
        document.getElementById("sign-github").addEventListener("click", () => {
            signInWithPopup(auth, provider1)
                .then((result) => {
                    const credential = GithubAuthProvider.credentialFromResult(result);
                    const token = credential.accessToken;

                    const user = result.user;
                    console.log(user);

                    let loggedUser = new User(
                        user.displayName,
                        user.email,
                        user.photoURL,
                        user.uid,
                    );
                    loggedUser.saveuser();
                    window.location.href = "/chat.html";
                })
                .catch((error) => {
                    console.log(error);
                });
        });
        document.getElementById("norm-sign").addEventListener("click", () => {
            const email = document.getElementById("auth-email").value;
            const password = document.getElementById("auth-password").value;
            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    const person = userCredential.user;
                    alert("Login successful!");
                    window.location.href = "/chat.html";
                    console.log(person);
                })
                .catch((error) => {
                    console.log(error);
                });
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const uid = user.uid;
                console.log("user is logged in:", user);
            } else {
                console.log("user is logged out");
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

        crossorigin="anonymous"></script>
</body>

</html>
