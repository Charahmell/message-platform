<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blink-GC-Auth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="style.css" />
</head>

<body id="blink">
    <div class="glass-card auth-card">
        <h4 class="auth-title">Welcome back</h4>
        <p class="auth-subtitle">Sign in to continue your conversations</p>
        
        <div class="auth-tabs">
            <button class="auth-tab active" id="tab-login">Log In</button>
            <button class="auth-tab" id="tab-signup">Sign Up</button>
        </div>

        <form id="auth-form" class="auth-form" onsubmit="return false;">
            <div class="input-group" id="name-group" style="display: none;">
                <label for="auth-name">Display Name</label>
                <input type="text" id="auth-name" placeholder="John Doe" autocomplete="name" />
            </div>
            <div class="input-group">
                <label for="auth-email">Email Address</label>
                <input type="email" id="auth-email" placeholder="name@example.com" required autocomplete="email" />
            </div>
            <div class="input-group">
                <label for="auth-password">Password</label>
                <input type="password" id="auth-password" placeholder="••••••••" required autocomplete="current-password" />
            </div>
            
            <button type="submit" id="auth-submit" class="btn-primary auth-submit-btn">
                <span>Sign In</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </form>

        <div class="auth-divider">or continue with</div>

        <div class="social-btns">
            <button id="sign-google" class="social-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Google
            </button>
            <button id="sign-github" class="social-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                    <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
                </svg>
                GitHub
            </button>
        </div>
    </div>

    <div id="toast" class="toast"></div>


    <script type="module">
        import User from "./user.js";

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import {
            createUserWithEmailAndPassword,
            updateProfile,
            signInWithEmailAndPassword,
            GithubAuthProvider,
            GoogleAuthProvider,
            getAuth,
            onAuthStateChanged,
            signInWithPopup,
        } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAS-d_3VUTsW2A7yEIVW0ETqY1um3fPPz0",
            authDomain: "febfire-700ba.firebaseapp.com",
            projectId: "febfire-700ba",
            storageBucket: "febfire-700ba.firebasestorage.app",
            messagingSenderId: "17245351215",
            appId: "1:17245351215:web:a0107d6dcddb677ce2c5da",
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const googleProvider = new GoogleAuthProvider();
        const githubProvider = new GithubAuthProvider();
        const auth = getAuth();

        const toastEl = document.getElementById("toast");
        const tabLogin = document.getElementById("tab-login");
        const tabSignup = document.getElementById("tab-signup");
        const nameGroup = document.getElementById("name-group");
        const authTitle = document.querySelector(".auth-title");
        const authSubtitle = document.querySelector(".auth-subtitle");
        const submitBtnText = document.querySelector("#auth-submit span");
        const authForm = document.getElementById("auth-form");


        let isLogin = true;


        function showToast(message, type = "success") {
            toastEl.textContent = message;
            toastEl.className = `toast show toast-${type}`;
            setTimeout(() => {
                toastEl.classList.remove("show");
            }, 3500);
        }

        tabLogin.addEventListener("click", () => {
            if (isLogin) return;
            isLogin = true;
            tabLogin.classList.add("active");
            tabSignup.classList.remove("active");
            nameGroup.style.display = "none";
            document.getElementById("auth-name").removeAttribute("required");
            authTitle.textContent = "Welcome back";
            authSubtitle.textContent = "Sign in to continue your conversations";
            submitBtnText.textContent = "Sign In";
        });

        tabSignup.addEventListener("click", () => {
            if (!isLogin) return;
            isLogin = false;
            tabSignup.classList.add("active");
            tabLogin.classList.remove("active");
            nameGroup.style.display = "flex";
            document.getElementById("auth-name").setAttribute("required", "true");
            authTitle.textContent = "Create an account";
            authSubtitle.textContent = "Join Blink-GC to start chatting";
            submitBtnText.textContent = "Sign Up";
        });  

        authForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("auth-email").value;
            const password = document.getElementById("auth-password").value;
            const submitBtn = document.getElementById("auth-submit");
            
            const originalText = submitBtnText.textContent;
            submitBtnText.textContent = "Please wait...";
            submitBtn.disabled = true;

            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    const name = document.getElementById("auth-name").value;
                    const userCred = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(userCred.user, { displayName: name });
                }
                showToast(isLogin ? "Login successful!" : "Account created successfully!", "success");
                setTimeout(() => window.location.href = "/chat.html", 500);
            } catch (error) {
                console.error(error);
                let msg = "An error occurred.";
                if (error.code === 'auth/invalid-credential') msg = "Invalid email or password.";
                else if (error.code === 'auth/email-already-in-use') msg = "This email is already registered.";
                else if (error.code === 'auth/weak-password') msg = "Password should be at least 6 characters.";
                showToast(msg, "error");
            } finally {
                submitBtnText.textContent = originalText;
                submitBtn.disabled = false;
            }
        });

        // Google Sign In
        document.getElementById("sign-google").addEventListener("click", async () => {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const u = result.user;
                new User(u.displayName, u.email, u.photoURL, u.uid).saveuser();
                window.location.href = "/chat.html";
            } catch (error) {
                console.error(error);
                showToast("Google sign in failed.", "error");
            }
        });

        // GitHub Sign In
        document.getElementById("sign-github").addEventListener("click", async () => {
            try {
                const result = await signInWithPopup(auth, githubProvider);
                const u = result.user;
                new User(u.displayName, u.email, u.photoURL, u.uid).saveuser();
                window.location.href = "/chat.html";
            } catch (error) {
                console.error(error);
                showToast("GitHub sign in failed.", "error");
            }
        });

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
