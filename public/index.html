<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blink-GC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body id="blink">
    <div class="blink-content glass-card">
      <h1 class="brand">Blink-GC</h1>
      <div class="card">
        <div class="loader">
          <h3>Chat with</h3>
          <div class="words">
            <span class="word">Friends</span>
            <span class="word">Malik</span>
            <span class="word">Funmi</span>
            <span class="word">Pampam</span>
            <span class="word">Idris</span>
            <span class="word">Halima</span>
          </div>
        </div>
      </div>
      <!-- <h2>Stay Connected. <br>Just Blink.</h2> -->
      <h2 class="tagline">Stay connected with friends. Just Blink.</h2>
      <div class="b1">
         <button class="btn-primary" onclick="window.location.href='/login.html'">Click here to get started
           <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
           </svg>
          </button>
      </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
